name: CI/CD Pipeline

on:
  push:
    branches:
      - '*develop*'
      - '*master*'
  pull_request:
    branches:
      - '*develop*'
      - '*master*'

jobs:
  cross_build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.20.0'
      
      - name: Create Build Directory
        run: mkdir -p build
      
      - name: Configure project with CMake
        run: |
          cd build
          cmake ..
      
      - name: Build project
        run: |
          cd build
          cmake --build .
      
      - name: Run Tests with CTest
        run: |
          cd build
          ctest --output-on-failure
      
      - name: Deploy
        run: echo "Deployment step - ready for production"
